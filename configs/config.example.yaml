# Example configuration file for Go Base App
app:
  name: "go-base-app"
  version: "1.0.0"
  environment: "development"
  debug: true

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"
  graceful_stop: "10s"

database:
  driver: "sqlite"
  dsn: "./data/app.db"
  max_open_conns: 25
  max_idle_conns: 25
  conn_max_lifetime: "5m"
  conn_max_idle_time: "5m"
  auto_migrate: true

security:
  jwt_secret: "your-secret-key-change-in-production"
  jwt_expiration: "24h"
  rate_limit_requests: 100
  rate_limit_window: "1m"
  cors_allow_origins: ["*"]
  enable_https: false
  tls_cert_file: ""
  tls_key_file: ""

logger:
  level: "info"
  format: "json"
  output: "stdout"
  structured: true

features:
  enable_metrics: true
  enable_tracing: false
  enable_profiling: false
  enable_swagger: true
  enable_healthz: true
  enable_playground: false